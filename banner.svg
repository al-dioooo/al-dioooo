<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@700&amp;family=Share+Tech+Mono&amp;display=swap');
    
    .title { font-family: 'Josefin Sans', 'Segoe UI', Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #1c1917; }
    .subtitle { font-family: 'Share Tech Mono', monospace, Courier; font-size: 13px; fill: #57534d; letter-spacing: 2px; font-weight: bold; }
    .meta { font-family: 'Share Tech Mono', monospace, Courier; font-size: 13px; fill: #1c1917; }
    .label { font-family: 'Share Tech Mono', monospace, Courier; font-size: 13px; font-weight: bold; fill: #79716b; }
    .header-text { font-family: monospace; font-size: 12px; font-weight: bold; fill: #1c1917; }
    .monotext { font-family: monospace; font-size: 11px; fill: #1c1917; }
  </style>

  <!-- Hard Drop Shadow Box -->
  <rect x="12" y="12" width="776" height="216" fill="#79716b" stroke="#1c1917" stroke-width="3" />
  
  <!-- Main Card Body -->
  <rect x="4" y="4" width="776" height="216" fill="#e7e5e4" stroke="#1c1917" stroke-width="3" />
  
  <!-- Top Window Header Bar -->
  <rect x="4" y="4" width="776" height="34" fill="#d6d3d1" stroke="#1c1917" stroke-width="3" />
  
  <!-- Control Dots -->
  <circle cx="22" cy="21" r="6" fill="#f87171" stroke="#1c1917" stroke-width="2" />
  <circle cx="40" cy="21" r="6" fill="#fbbf24" stroke="#1c1917" stroke-width="2" />
  <circle cx="58" cy="21" r="6" fill="#34d399" stroke="#1c1917" stroke-width="2" />
  
  <text x="78" y="25" class="header-text">profile.sys</text>
  
  <!-- Grid background dashed details -->
  <line x1="4" y1="85" x2="780" y2="85" stroke="#d6d3d1" stroke-width="1" stroke-dasharray="4" />
  <line x1="4" y1="135" x2="780" y2="135" stroke="#d6d3d1" stroke-width="1" stroke-dasharray="4" />
  <line x1="4" y1="185" x2="780" y2="185" stroke="#d6d3d1" stroke-width="1" stroke-dasharray="4" />
  
  <!-- Avatar Frame -->
  <rect x="30" y="60" width="120" height="120" fill="#f5f5f4" stroke="#1c1917" stroke-width="3" />
  <!-- Neobrutalist Avatar Graphic -->
  <rect x="36" y="66" width="108" height="108" fill="#d6d3d1" />
  <!-- Simple abstract face graphic representation -->
  <circle cx="90" cy="110" r="30" fill="#fafaf9" stroke="#1c1917" stroke-width="2" />
  <path d="M70 150 C70 130 80 135 90 135 C100 135 110 130 110 150 Z" fill="#79716b" stroke="#1c1917" stroke-width="2" />
  <circle cx="82" cy="106" r="3" fill="#1c1917" />
  <circle cx="98" cy="106" r="3" fill="#1c1917" />
  <path d="M86 118 Q90 122 94 118" stroke="#1c1917" stroke-width="2" fill="none" />

  <!-- Profile Text details -->
  <text x="170" y="85" class="title">ALDIO LISAFRON</text>
  <text x="170" y="108" class="subtitle">CREATIVE FULL-STACK DEVELOPER</text>
  
  <!-- Specs table list -->
  <text x="170" y="142" class="label">&gt; LOCATION:</text>
  <text x="260" y="142" class="meta">Bogor, West Java, ID</text>
  
  <text x="170" y="162" class="label">&gt; MAJOR:</text>
  <text x="260" y="162" class="meta">Software Engineering @ IPB</text>
  
  <text x="170" y="182" class="label">&gt; STATE:</text>
  <text x="260" y="182" class="meta">active / building_interfaces</text>
  
  <!-- Right side status panel -->
  <rect x="520" y="60" width="230" height="120" fill="#f5f5f4" stroke="#1c1917" stroke-width="3" />
  <rect x="520" y="60" width="230" height="24" fill="#d6d3d1" stroke="#1c1917" stroke-width="3" />
  <text x="530" y="76" class="header-text">status_monitor.log</text>
  
  <!-- Online Dot -->
  <circle cx="538" cy="110" r="5" fill="#22c55e" stroke="#1c1917" stroke-width="1.5" />
  <text x="552" y="114" class="monotext">Connection: ONLINE</text>
  
  <!-- System Status Dot -->
  <circle cx="538" cy="136" r="5" fill="#fb7185" stroke="#1c1917" stroke-width="1.5" />
  <text x="552" y="140" class="monotext">Shell: /bin/zsh</text>
  
  <text x="530" y="164" class="monotext" fill="#79716b">&gt; System status optimal.</text>
</svg>
